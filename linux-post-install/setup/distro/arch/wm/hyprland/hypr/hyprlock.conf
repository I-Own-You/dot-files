$mpris_art = /tmp/hyde-mpris.png
$wall = $HOME/Pictures/wallpapers/lofi-open-sky.png

# BACKGROUND
background {
    monitor =
    path = $wall
    blur_passes = 1
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    #vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    disable_loading_bar = false
    grace = 1
}

