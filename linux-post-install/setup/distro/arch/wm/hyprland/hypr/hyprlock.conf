# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M:%S")</span>"
    color = rgb(205, 214, 244)
    font_size = 40
    font_family = JetBrainsMono Nerd Font
    position = -50, 270
    halign = right
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[] echo "<span>$(date +"%A, %B %-d, %Y")</span>"
    color = rgba(205, 214, 224, .75)
    font_size = 20
    text_align = center
    font_family = JetBrainsMono Nerd Font
    position = -50, 200
    halign = right
    valign = center
    
}

# Profie-Photo
image {
    monitor =
    path = ~/.config/hypr/pfp.webp
    border_size = 1
    border_color = rgba(137, 180, 250, .75)
    size = 160
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = -630, 25
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 320, 55
    color = rgba(88, 91, 112, 0.5)
    rounding = -1
    border_size = 0
    border_color = rgb(255, 255, 255)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 0, 200
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =  $USER
    color = rgba(213, 224, 216, 1)
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(213, 224, 216, 1)
    inner_color = rgba(88, 91, 112, 0.5)
    font_color = rgb(205, 214, 244)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <i><span foreground="##fff">🔒 Enter Pass</span></i>
    hide_input = false
    position = 0, 130
    halign = center
    valign = center
}

